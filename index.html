<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Guia de aves da Unesp Araraquara: espécies registradas no câmpus, Instituto de Química, Centro de Ciências e unidades na área central da cidade." />
    
    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Cores do tema para dispositivos móveis -->
    <meta name="theme-color" content="#0E5374" />
    <meta name="msapplication-TileColor" content="#0E5374" />
    
    <title>Aves da Unesp - Câmpus Araraquara</title>

    <!-- Script para SPA routing no GitHub Pages -->
    <script>
      (function() {
        // Verifica se há parâmetro de redirecionamento do 404.html
        var search = window.location.search;
        if (search && search.indexOf('?p=') === 0) {
          // Extrai a rota original
          var path = decodeURIComponent(search.slice(3));
          // Mantém o basePath na URL restaurada
          var repo = '/guia-aves-unesp-aqa-vite';
          window.history.replaceState(null, '', repo + path);
        }
      })();
    </script>    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
