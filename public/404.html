<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Aves da Unesp - Câmpus Araraquara</title>
    <script>
      // Solução para SPA no GitHub Pages
      // Captura a rota atual e redireciona para index.html com a rota como parâmetro
      // O index.html então restaura a rota original usando history.replaceState
      (function() {
        // Detecta o basePath automaticamente baseado no pathname
        // Funciona tanto em /aves-unesp/ quanto em /
        var segments = window.location.pathname.split('/').filter(Boolean);
        var repo = '';

        // Se estiver no GitHub Pages (usuario.github.io/repo/)
        // o primeiro segmento é o nome do repo
        if (window.location.hostname.includes('github.io') && segments.length > 0) {
        repo = '/' + segments[0];
        }
        
        var path = window.location.pathname;
        if (repo && path.indexOf(repo) === 0) {
        path = path.slice(repo.length) || '/';
        }
        
        var search = window.location.search;
        var hash = window.location.hash;
        
        // Redireciona para a página principal com a rota codificada
        var redirectUrl = repo + '/?p=' + encodeURIComponent(path + search + hash);
        window.location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body>
    <p>Redirecionando...</p>
  </body>
</html>
